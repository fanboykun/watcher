name: Release Watcher

# ==============================================================
# CONFIGURATION -- edit this block if you fork this repo
# ==============================================================
env:
  APP_NAME: watcher
  GO_VERSION: "1.21"
  WATCHER_ENTRY: cmd/watcher/main.go
  WATCHER_BINARY: watcher.exe
# ==============================================================

on:
  push:
    branches: main
    paths:
      - ".github/workflows/**"
      - "cmd/**"
      - "internal/**"
      - "web/**"
      - "go.mod"
      - "go.sum"
      - "shell/**"
      - "install.bat"
      - ".env.example"
      - "INSTALL.md"
      - "README.md"
  workflow_dispatch:
    inputs:
      force_bump:
        description: "Force bump type (patch|minor|major) -- skips commit analysis"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  # ============================================================
  # JOB 1 -- SEMANTIC VERSION TAG
  # ============================================================
  tag:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Semantic Version Tag
    environment: production
    outputs:
      should_release: ${{ steps.semver.outputs.should_release }}
      new_tag:        ${{ steps.semver.outputs.new_tag }}
      bump_type:      ${{ steps.semver.outputs.bump_type }}
      changelog:      ${{ steps.semver.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump and tag
        id: semver
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Latest tag: ${LATEST_TAG:-none}"

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet -- only look at the most recent commit to avoid
            # scanning all history and over-bumping on first release
            COMMITS=$(git log -1 --pretty=format:"%s" 2>/dev/null)
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null)
          fi

          if [ -z "$COMMITS" ]; then
            echo "No commits since ${LATEST_TAG:-beginning}"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo "${VERSION:-0.0.0}" | cut -d. -f1)
          MINOR=$(echo "${VERSION:-0.0.0}" | cut -d. -f2)
          PATCH=$(echo "${VERSION:-0.0.0}" | cut -d. -f3)

          echo "Commits since ${LATEST_TAG:-beginning}:"
          echo "$COMMITS"

          classify_commit() {
            local msg="$1"
            if echo "$msg" | grep -qiE "(BREAKING[[:space:]]CHANGE|^[a-z]+(\(.+\))?!:)"; then echo "major"; return; fi
            if echo "$msg" | grep -qiE "^feat(\(.+\))?:"; then echo "minor"; return; fi
            if echo "$msg" | grep -qiE "^(fix|perf|refactor)(\(.+\))?:"; then echo "patch"; return; fi
            if echo "$msg" | grep -qiE "^(chore|docs|ci|style|test|build)(\(.+\))?:"; then echo "skip"; return; fi
            if echo "$msg" | grep -qiE "^major:"; then echo "major"; return; fi
            if echo "$msg" | grep -qiE "^minor:"; then echo "minor"; return; fi
            if echo "$msg" | grep -qiE "^patch:"; then echo "patch"; return; fi
            if echo "$msg" | grep -qiE "^bump:[[:space:]]*(major|breaking)"; then echo "major"; return; fi
            if echo "$msg" | grep -qiE "^bump:[[:space:]]*(minor|feature|feat)"; then echo "minor"; return; fi
            if echo "$msg" | grep -qiE "^bump:[[:space:]]*(patch|fix)"; then echo "patch"; return; fi
            if echo "$msg" | grep -qiE "^release(\(major\))?:"; then echo "major"; return; fi
            if echo "$msg" | grep -qiE "^release\(minor\):"; then echo "minor"; return; fi
            if echo "$msg" | grep -qiE "^release(\(patch\))?:"; then echo "patch"; return; fi
            if echo "$msg" | grep -qiE "\[release:(major|breaking)\]"; then echo "major"; return; fi
            if echo "$msg" | grep -qiE "\[release:(minor|feature|feat)\]"; then echo "minor"; return; fi
            if echo "$msg" | grep -qiE "\[release(:(patch|fix))?\]"; then echo "patch"; return; fi
            echo "skip"
          }

          bump_priority() {
            case "$1" in
              major) echo 3 ;;
              minor) echo 2 ;;
              patch) echo 1 ;;
              *)     echo 0 ;;
            esac
          }

          BUMP=""
          BUMP_LEVEL=0
          CHANGELOG=""
          SKIP_ONLY=true

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            RESULT=$(classify_commit "$msg")
            RESULT_LEVEL=$(bump_priority "$RESULT")

            # Only upgrade bump level -- never downgrade
            if [ "$RESULT_LEVEL" -gt "$BUMP_LEVEL" ]; then
              BUMP_LEVEL=$RESULT_LEVEL
              BUMP=$RESULT
            fi

            if [ "$RESULT_LEVEL" -gt 0 ]; then
              CHANGELOG="${CHANGELOG}* ${msg}\n"
              SKIP_ONLY=false
            fi
          done <<< "$COMMITS"

          FORCE="${{ github.event.inputs.force_bump }}"
          if [ -n "$FORCE" ]; then
            BUMP="$FORCE"
            SKIP_ONLY=false
            CHANGELOG="Manually triggered ($FORCE bump)\n"
          fi

          # ── Fallback: important files changed but no releasable commit ──────
          # Covers commits like "chore: update deps" that touch real deliverables
          # but don't follow a releasable pattern. Defaults to patch.
          if [ "$SKIP_ONLY" = "true" ] || [ -z "$BUMP" ]; then
            # Always diff committed changes -- never unstaged working tree
            CHANGED=$(git diff --name-only "${LATEST_TAG}..HEAD" 2>/dev/null || git diff --name-only HEAD~1..HEAD 2>/dev/null)
            echo "Checking changed files for important content:"
            echo "$CHANGED"

            IMPORTANT=false
            while IFS= read -r file; do
              case "$file" in
                .github/workflows/*|cmd/*|internal/*|web/*|go.mod|go.sum|shell/*|install.bat|.env.example|INSTALL.md|README.md)
                  IMPORTANT=true
                  break
                  ;;
              esac
            done <<< "$CHANGED"

            if [ "$IMPORTANT" = "true" ]; then
              echo "Important files changed but no commit pattern matched -- defaulting to patch"
              BUMP="patch"
              SKIP_ONLY=false
              CHANGELOG="* ${COMMITS//$'\n'/$'\n* '}\n"
            else
              echo "No releasable commits and no important file changes -- skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG ($BUMP bump)"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          CHANGELOG_ESCAPED="${CHANGELOG//$'\n'/'%0A'}"
          echo "should_release=true"          >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG"             >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP"              >> $GITHUB_OUTPUT
          echo "changelog=$CHANGELOG_ESCAPED" >> $GITHUB_OUTPUT

  # ============================================================
  # JOB 2 -- BUILD & PACKAGE RELEASE
  # ============================================================
  release:
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.should_release == 'true'
    name: Build and Release ${{ needs.tag.outputs.new_tag }}
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go version

      # ── Build SvelteKit SPA ──────────────────────────────────────────────
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build SvelteKit SPA
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build
          echo "SPA build output:"
          ls -la build/

      # ── Build watcher.exe for Windows ──────────────────────────────────────
      - name: Build watcher.exe (Windows amd64, SPA embedded)
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -ldflags="-X main.Version=${{ needs.tag.outputs.new_tag }}" \
            -o dist/${{ env.WATCHER_BINARY }} \
            ${{ env.WATCHER_ENTRY }}
          echo "Built: $(ls -lh dist/${{ env.WATCHER_BINARY }})"

      # ── Assemble release package ────────────────────────────────────────────
      # The zip contains everything the user needs to bootstrap a server:
      #   watcher.exe             -- the agent binary (SPA embedded)
      #   install.bat             -- double-click to launch the GUI wizard
      #   shell/
      #     install-watcher.ps1   -- wizard + automated install script
      #   .env.example            -- example config (copy to .env and edit)
      #   INSTALL.md              -- step-by-step install guide
      - name: Assemble release package
        id: zip
        run: |
          ZIP_NAME="${{ env.APP_NAME }}-${{ needs.tag.outputs.new_tag }}.zip"
          STAGING="staging"

          mkdir -p "$STAGING/shell"

          cp dist/${{ env.WATCHER_BINARY }} "$STAGING/"
          cp install.bat                    "$STAGING/"
          cp shell/install-watcher.ps1      "$STAGING/shell/"
          cp .env.example                   "$STAGING/"
          cp INSTALL.md                     "$STAGING/"

          cd "$STAGING" && zip -r "../${ZIP_NAME}" . && cd ..

          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "Release package contents:"
          unzip -l "${ZIP_NAME}"

      # ── Generate version.json ───────────────────────────────────────────────
      # Allows a meta-watcher to auto-update the watcher itself in the future
      - name: Generate version.json
        run: |
          VERSION="${{ needs.tag.outputs.new_tag }}"
          ZIP_NAME="${{ steps.zip.outputs.zip_name }}"
          REPO="${{ github.repository }}"
          ARTIFACT_URL="https://github.com/${REPO}/releases/download/${VERSION}/${ZIP_NAME}"

          cat > version.json << EOF
          {
            "services": {
              "${{ env.APP_NAME }}": {
                "version": "${VERSION}",
                "artifact": "${ZIP_NAME}",
                "artifact_url": "${ARTIFACT_URL}",
                "published_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              }
            }
          }
          EOF
          cat version.json

      # ── Create GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.new_tag }}
          name: "Watcher ${{ needs.tag.outputs.new_tag }}"
          body: |
            ## What's changed (${{ needs.tag.outputs.bump_type }} bump)

            ${{ needs.tag.outputs.changelog }}

            ---

            ## Installation

            1. Download `${{ steps.zip.outputs.zip_name }}`
            2. Extract to `D:\apps\watcher\` on your Windows server
            3. Double-click `install.bat` to launch the setup wizard

            See `INSTALL.md` inside the zip for the full guide.
          files: |
            ${{ steps.zip.outputs.zip_name }}
            version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ needs.tag.outputs.new_tag }}"
          ZIP_NAME="${{ steps.zip.outputs.zip_name }}"
          echo ""
          echo "Released: $VERSION (${{ needs.tag.outputs.bump_type }} bump)"
          echo "Download: https://github.com/${REPO}/releases/download/${VERSION}/${ZIP_NAME}"
          echo ""
