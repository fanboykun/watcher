# Air configuration for hot reloading during development
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # Build command — compile for local dev
  cmd = "go build -ldflags '-X main.Version=dev' -o ./tmp/watcher ./cmd/watcher"
  bin = "./tmp/watcher"
  args_bin = ["-config", ".env"]

  # Watch these extensions
  include_ext = ["go", "env"]

  # Exclude directories
  exclude_dir = ["tmp", "bin", "vendor", "node_modules", "web", ".git", ".github", ".agent"]

  # Exclude files
  exclude_file = []

  # Exclude regex
  exclude_regex = ["_test\\.go$"]

  # Exclude unchanged files
  exclude_unchanged = false

  # Follow symlinks
  follow_symlink = false

  # Delay after file change (ms)
  delay = 1000

  # Stop running old binary on rebuild
  stop_on_error = true

  # Send interrupt signal before killing
  send_interrupt = true
  kill_delay = 500 # ms

  # Log output
  log = "build-errors.log"

[log]
  time = false
  main_only = false

[color]
  main    = "cyan"
  watcher = "green"
  build   = "yellow"
  runner  = "magenta"

[misc]
  clean_on_exit = true
